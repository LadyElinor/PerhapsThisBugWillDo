meta:
  version: v0.2
  date: 2026-03-14
  purpose: Crover-like subsurface regolith navigation concept presets
  default_recommended: regolith_swimmer_balanced_r2

variants:
  regolith_swimmer_v1:
    description: low-disturbance subsurface scouting profile for loose regolith pockets

    # geometry
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation

    # control phases
    phases: [entry, translate, resurface]

    # safety + mission constraints
    max_target_depth_m: 0.35
    disturbance_index_cap: 0.40
    collapse_risk_abort_threshold: 0.70
    resurfacing_margin_min: 1.10

    # power + thermal reserve policy
    min_energy_reserve_fraction: 0.25
    max_component_temp_c: 70

    # sensing profile
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true

    # integration intent
    integration_mode: optional_subsystem
    notes: "Surface hexapod mode remains primary; this variant is a mission-conditional extension."

  regolith_swimmer_conservative:
    description: reduced-depth, lower-disturbance profile with larger abort margin
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation
    phases: [entry, translate, resurface]
    max_target_depth_m: 0.22
    disturbance_index_cap: 0.30
    collapse_risk_abort_threshold: 0.62
    resurfacing_margin_min: 1.18
    min_energy_reserve_fraction: 0.30
    max_component_temp_c: 65
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true
    integration_mode: optional_subsystem
    notes: "Prefer for uncertain media characterization and tight risk posture."

  regolith_swimmer_aggressive:
    description: deeper scouting profile with looser disturbance budget and tighter reserves
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation
    phases: [entry, translate, resurface]
    max_target_depth_m: 0.50
    disturbance_index_cap: 0.50
    collapse_risk_abort_threshold: 0.78
    resurfacing_margin_min: 1.05
    min_energy_reserve_fraction: 0.20
    max_component_temp_c: 75
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true
    integration_mode: optional_subsystem
    notes: "Use only when mission requires deeper in-medium coverage and risk budget allows."

  regolith_swimmer_balanced_r2:
    description: balanced production-candidate profile tuned for stable margin and moderate depth
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation
    phases: [entry, translate, resurface]
    max_target_depth_m: 0.32
    disturbance_index_cap: 0.38
    collapse_risk_abort_threshold: 0.71
    resurfacing_margin_min: 1.12
    min_energy_reserve_fraction: 0.26
    max_component_temp_c: 69
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true
    integration_mode: optional_subsystem
    notes: "Recommended for baseline lunar-weevil prototype iteration with guardrails."

  regolith_swimmer_deep_scout_r1:
    description: deep-pocket scouting variant with tightened thermal guard despite depth push
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation
    phases: [entry, translate, resurface]
    max_target_depth_m: 0.58
    disturbance_index_cap: 0.46
    collapse_risk_abort_threshold: 0.83
    resurfacing_margin_min: 1.08
    min_energy_reserve_fraction: 0.23
    max_component_temp_c: 67
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true
    integration_mode: optional_subsystem
    notes: "For targeted deep volatile proxy passes; requires stricter autonomy watchdogs."

  regolith_swimmer_low_energy_guard_r1:
    description: energy-constrained fallback profile for end-of-sol contingency operations
    leading_profile: wedge_shovel
    body_form: elongated_ovoid
    propulsion_mode: rotational_coupled_translation
    phases: [entry, translate, resurface]
    max_target_depth_m: 0.24
    disturbance_index_cap: 0.31
    collapse_risk_abort_threshold: 0.66
    resurfacing_margin_min: 1.16
    min_energy_reserve_fraction: 0.34
    max_component_temp_c: 64
    sensing:
      thermal: true
      volatile_proxy: true
      load_trend: true
    integration_mode: optional_subsystem
    notes: "Prioritizes survivability and guaranteed resurface under low-energy budget."
